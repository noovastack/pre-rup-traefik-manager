replicaCount: 1

image:
  repository: ghcr.io/noovastack/traefik-manager
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: "traefik-manager-sa"

podAnnotations: {}
podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: "traefik"
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}

# Persistent storage for the SQLite database and encryption key file.
# Disable only for ephemeral/testing deployments — data will be lost on pod restart.
persistence:
  enabled: true
  size: 1Gi
  storageClass: ""  # Leave empty to use the cluster default StorageClass

# Reference an existing Secret containing the AES-256 encryption key (32-byte hex).
# If left empty, a key is auto-generated and stored in the /data volume on first start.
# Example: kubectl create secret generic tm-secrets --from-literal=encryptionKey=<hex>
encryptionKeySecret:
  name: ""   # Secret name; leave empty to use auto-generated key
  key: encryptionKey

