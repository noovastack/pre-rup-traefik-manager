apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: traefik-manager-data
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik-manager
  namespace: default
  labels:
    app: traefik-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traefik-manager
  template:
    metadata:
      labels:
        app: traefik-manager
    spec:
      serviceAccountName: traefik-manager
      containers:
        - name: traefik-manager
          image: ghcr.io/noovastack/traefik-manager:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: TM_ADDR
              value: ":8080"
            - name: TM_DB_PATH
              value: "/data/traefik-manager.db"
            - name: TM_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: traefik-manager-secrets
                  key: encryptionKey
                  optional: true  # Omit to auto-generate (key stored in /data)
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: traefik-manager-data
---
apiVersion: v1
kind: Service
metadata:
  name: traefik-manager
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: traefik-manager
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
