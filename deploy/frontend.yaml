apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik-manager-ui
  namespace: default
  labels:
    app: traefik-manager-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traefik-manager-ui
  template:
    metadata:
      labels:
        app: traefik-manager-ui
    spec:
      containers:
        - name: traefik-manager-ui
          image: docker.io/library/traefik-manager-ui:local
          imagePullPolicy: Never
          securityContext:
            runAsUser: 0
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: traefik-manager-ui
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: traefik-manager-ui
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
# IngressRoute: / → UI, /api → backend
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-manager-ingress
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/api`)
      kind: Rule
      services:
        - name: traefik-manager
          port: 80
    - match: PathPrefix(`/`)
      kind: Rule
      services:
        - name: traefik-manager-ui
          port: 80
