services:

  # ── Traefik ────────────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.1
    container_name: traefik
    restart: unless-stopped
    ports:
      - "8081:80"
      - "8443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - letsencrypt:/letsencrypt
    networks:
      - proxy

  # ── Traefik Manager Backend ────────────────────────────────────────────────
  traefik-manager-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: traefik-manager-api
    restart: unless-stopped
    environment:
      TM_DB_PATH: /data/traefik-manager.db
      TM_ADDR: :8080
      TM_ENCRYPTION_KEY: ${TM_ENCRYPTION_KEY}
    volumes:
      - tm-data:/data
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tm-api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.tm-api.entrypoints=web"
      - "traefik.http.services.tm-api.loadbalancer.server.port=8080"

  # ── Traefik Manager Frontend ───────────────────────────────────────────────
  traefik-manager-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: traefik-manager-ui
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tm-ui.rule=PathPrefix(`/`)"
      - "traefik.http.routers.tm-ui.entrypoints=web"
      - "traefik.http.services.tm-ui.loadbalancer.server.port=80"

volumes:
  tm-data:        # SQLite database
  letsencrypt:    # Let's Encrypt certificates

networks:
  proxy:
    external: false
