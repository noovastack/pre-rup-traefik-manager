# traefik.yml — Static configuration for Traefik.
# This file must be deployed alongside the Traefik container.

api:
  dashboard: true
  insecure: true   # Disable in production; use a router + auth middleware instead.

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  # File provider watches the dynamic config generated by Traefik Manager.
  file:
    filename: /etc/traefik/traefik-manager/dynamic_conf.yaml
    watch: true

  # Docker provider for container auto-discovery (optional).
  docker:
    exposedByDefault: false

# Certificate resolvers — adjust to your DNS/HTTP challenge setup.
certificatesResolvers:
  letsencrypt:
    acme:
      email: admin@example.com
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web
  staging:
    acme:
      email: admin@example.com
      storage: /letsencrypt/acme-staging.json
      caServer: https://acme-staging-v02.api.letsencrypt.org/directory
      httpChallenge:
        entryPoint: web
